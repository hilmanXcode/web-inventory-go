{{ define "_content" }}
    <div class="table-header" style="margin-bottom: 24px;">
        <h2 class="page-title" style="margin-bottom: 0;">Master Barang</h2>
        <button class="btn-sm btn-primary" onclick="openModal('modalBarang')">+ Tambah Barang</button>
    </div>

    <div class="table-container">
        <table>
            <thead>
                <tr>
                    <th>SKU / Kode</th>
                    <th>Nama Barang</th>
                    <th>Kategori</th>
                    <th>Stok Saat Ini</th>
                    <th>Aksi</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>BRG-001</td>
                    <td>Laptop ASUS ROG</td>
                    <td>Elektronik</td>
                    <td><strong>24 Unit</strong></td>
                    <td>
                        <button class="action-btn edit" title="Edit"><i class='bx bx-edit'></i></button>
                        <button class="action-btn delete" title="Hapus"><i class='bx bx-trash'></i></button>
                    </td>
                </tr>
                <!-- Looping data di sini -->
            </tbody>
        </table>
    </div>


<!-- Modal Tambah Barang -->
<div class="modal-overlay" id="modalBarang">
    <div class="modal-content">
        <div class="modal-header">
            <h3>Tambah Barang Baru</h3>
            <button class="close-modal" onclick="closeModal('modalBarang')">&times;</button>
        </div>
        <form action="/barang/create" method="POST">
            <div class="form-group">
                <label>Kode Barang (SKU)</label>
                <input type="text" class="form-control" name="sku" required>
            </div>
            <div class="form-group">
                <label>Nama Barang</label>
                <input type="text" class="form-control" name="nama" required>
            </div>
            <div class="form-group">
                <label>Kategori</label>
                <select class="form-control" name="kategori">
                    <option value="Elektronik">Elektronik</option>
                    <option value="Furnitur">Furnitur</option>
                    <option value="ATK">ATK</option>
                </select>
            </div>
            <div class="form-group" style="text-align: right; margin-top: 20px;">
                <button type="button" class="btn-sm btn-outline" onclick="closeModal('modalBarang')">Batal</button>
                <button type="submit" class="btn-sm btn-primary">Simpan Data</button>
            </div>
        </form>
    </div>
</div>
{{ end }}
