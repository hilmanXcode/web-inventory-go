<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Inventaris | Dashboard</title>
    
    <!-- Font Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Boxicons (Library Icon yang ringan dan modern) -->
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <link rel="stylesheet" href="/assets/css/dashboard.css">
 
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="flex">
                <i class='bx bx-box'></i>
                <h2>InventoryKu</h2>
            </div>

           <div class="close-btn-mobile">
                <i class='bx bx-menu'></i>
            </div>
        </div>
        
        <ul class="sidebar-menu">
            <li class="menu-title">Main Menu</li>
            <li class="menu-item">
                <a href="/dashboard"
                    {{ if eq .currentPage "dashboard" }}
                        class="menu-link active"
                    {{ else }}
                        class="menu-link" 
                    {{ end }}
                >
                    <i class='bx bx-grid-alt'></i>
                    <span>Dashboard</span>
                </a>
            </li>

            <li class="menu-title mt-10">Manajemen Data</li>
            <!-- Menu Realistis untuk diselesaikan cepat -->
            <li class="menu-item">
                <a href="/dashboard/master_barang"

                    {{ if eq .currentPage "master_barang" }}
                        class="menu-link active"
                    {{ else }}
                        class="menu-link" 
                    {{ end }}
                >
                    <i class='bx bx-data'></i>
                    <span>Master Barang</span>
                </a>
            </li>
            <li class="menu-item mt-10">
                <a href="/dashboard/barang_masuk"
                    {{ if eq .currentPage "barang_masuk" }}
                        class="menu-link active"
                    {{ else }}
                        class="menu-link" 
                    {{ end }}
                >
                    <i class='bx bx-log-in-circle'></i>
                    <span>Barang Masuk</span>
                </a>
            </li>
            <li class="menu-item mt-10">
                <a href="/dashboard/barang_keluar"
                    {{ if eq .currentPage "barang_keluar" }}
                        class="menu-link active"
                    {{ else }}
                        class="menu-link" 
                    {{ end }}
                >
                    <i class='bx bx-log-out-circle'></i>
                    <span>Barang Keluar</span>
                </a>
            </li>
            
            <li class="menu-title mt-10">Laporan</li>
            <li class="menu-item">
                <a href="/dashboard/laporan_stok"
                    {{ if eq .currentPage "laporan_stok" }}
                        class="menu-link active"
                    {{ else }}
                        class="menu-link" 
                    {{ end }}
                >
                    <i class='bx bx-file'></i>
                    <span>Laporan Stok</span>
                </a>
            </li>
        </ul>

        <div class="sidebar-footer">
            <a href="#" class="menu-link" style="padding:0; color: #ef4444;" id="btnLogout">
                <i class='bx bx-log-out'></i>
                <span>Logout</span>
            </a>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-wrapper">
        <!-- TOPBAR -->
        <header class="topbar">
            <button class="toggle-btn" id="toggleBtn">
                <i class='bx bx-menu'></i>
            </button>
            
            <div class="user-profile">
                <div style="text-align: right;">
                    <p style="font-size: 14px; font-weight: 600;">Admin Staf</p>
                    <p style="font-size: 12px; color: var(--text-light);">Gudang Utama</p>
                </div>
                <div class="user-avatar">AS</div>
            </div>
        </header>

        <!-- DASHBOARD CONTENT -->
        <div class="content">
            {{ template "_content" }}
        </div>
    </main>

    <!-- JAVASCRIPT UNTUK INTERAKTIVITAS -->
    <script src="/assets/js/dashboard.js"></script>
</body>
</html>
